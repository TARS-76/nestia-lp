<!-- @dsCard group="Type" viewport="700x230" name="Japanese Serif — Shippori Mincho" subtitle="Elegant mincho for JP headings & lead copy" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px 32px; background: var(--surface-page); }
  .jp { font-family: var(--font-serif-jp); letter-spacing: var(--ls-jp); color: var(--ink); }
  .h { font-size: 34px; font-weight: 600; line-height: 1.3; }
  .lead { font-size: 18px; font-weight: 400; line-height: 1.9; color: var(--ink-soft); margin-top: 16px; }
  .note { font-family: var(--font-body); font-size: 11px; letter-spacing: .04em; color: var(--text-muted); margin-top: 18px; }
</style>
</head>
<body>
  <div class="jp h">その日のあなたに合わせた、<br/>オーダーメイドケア</div>
  <div class="jp lead">日々がんばるあなたへ。今日の心と体に寄り添う、<br/>やさしいひとときをご用意しています。</div>
  <div class="note">Shippori Mincho · weights 400–700 · 行間ゆったり / line-height 1.9</div>
</body>
</html>
