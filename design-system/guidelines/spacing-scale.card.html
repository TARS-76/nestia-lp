<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing Scale" subtitle="8px rhythm, 4→128px" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 26px 32px; background: var(--surface-page); font-family: var(--font-body); }
  .row { display: flex; align-items: flex-end; gap: 18px; flex-wrap: wrap; }
  .item { text-align: center; }
  .bar { background: var(--almond); border-radius: var(--r-xs); }
  .lab { font-size: 11px; color: var(--text-muted); margin-top: 8px; letter-spacing: .03em; }
  .px { font-size: 10px; color: var(--text-strong); font-weight: 500; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="width:4px;height:24px"></div><div class="lab px">4</div><div class="lab">1</div></div>
    <div class="item"><div class="bar" style="width:8px;height:32px"></div><div class="lab px">8</div><div class="lab">2</div></div>
    <div class="item"><div class="bar" style="width:12px;height:40px"></div><div class="lab px">12</div><div class="lab">3</div></div>
    <div class="item"><div class="bar" style="width:16px;height:48px"></div><div class="lab px">16</div><div class="lab">4</div></div>
    <div class="item"><div class="bar" style="width:24px;height:58px"></div><div class="lab px">24</div><div class="lab">5</div></div>
    <div class="item"><div class="bar" style="width:32px;height:68px"></div><div class="lab px">32</div><div class="lab">6</div></div>
    <div class="item"><div class="bar" style="width:48px;height:80px"></div><div class="lab px">48</div><div class="lab">7</div></div>
    <div class="item"><div class="bar" style="width:64px;height:92px"></div><div class="lab px">64</div><div class="lab">8</div></div>
  </div>
</body>
</html>
