<!-- @dsCard group="Colors" viewport="700x180" name="Derived Tints & Neutrals" subtitle="Washes and warm neutrals derived from the palette" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .sw { width: 100px; border-radius: var(--r-sm); overflow: hidden; box-shadow: var(--shadow-xs); background: var(--white); }
  .chip { height: 52px; }
  .meta { padding: 7px 9px 9px; }
  .nm { font-family: var(--font-body); font-size: 11px; font-weight: 500; color: var(--ink); }
  .hex { font-family: var(--font-body); font-size: 10px; letter-spacing: .03em; color: var(--text-muted); margin-top: 1px; text-transform: uppercase; }
  .tag { font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; display: block; }
</style>
</head>
<body>
  <span class="tag">Tints · Neutrals</span>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--plum-700)"></div><div class="meta"><div class="nm">Plum 700</div><div class="hex">#5E3F3C</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--almond-200)"></div><div class="meta"><div class="nm">Almond 200</div><div class="hex">#ECDCD5</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--petal-soft)"></div><div class="meta"><div class="nm">Petal Soft</div><div class="hex">#FFE3EA</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink)"></div><div class="meta"><div class="nm">Ink</div><div class="hex">#3C2E2B</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-soft)"></div><div class="meta"><div class="nm">Ink Soft</div><div class="hex">#5C4A46</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--line)"></div><div class="meta"><div class="nm">Line</div><div class="hex">#E7DCD6</div></div></div>
  </div>
</body>
</html>
