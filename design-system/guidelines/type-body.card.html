<!-- @dsCard group="Type" viewport="700x250" name="Body — Zen Kaku Gothic New" subtitle="Soft humanist gothic for UI & running text (JP + Latin)" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px 32px; background: var(--surface-page); font-family: var(--font-body); }
  .eyebrow { font-size: 12px; font-weight: 500; letter-spacing: .22em; text-transform: uppercase; color: var(--text-muted); }
  .body { font-size: 16px; line-height: 1.8; color: var(--ink-soft); letter-spacing: .02em; margin-top: 12px; max-width: 560px; }
  .small { font-size: 14px; color: var(--text-muted); margin-top: 12px; }
  .weights { display: flex; gap: 22px; margin-top: 18px; align-items: baseline; }
  .weights span { font-size: 22px; color: var(--ink); }
  .note { font-size: 11px; letter-spacing: .04em; color: var(--text-muted); margin-top: 16px; }
</style>
</head>
<body>
  <div class="eyebrow">MENU · 人気No.1</div>
  <div class="body">オーダーメイドケアは、アロマ・ボディケア・ヘッド・リフレなどを自由に組み合わせ可能。その日の状態に合わせて施術内容を調整します。初めての方にもおすすめです。</div>
  <div class="small">90分 / 通常 12,800円 → 10,800円（税込）</div>
  <div class="weights"><span style="font-weight:300">Light 300</span><span style="font-weight:400">Regular 400</span><span style="font-weight:500">Medium 500</span><span style="font-weight:700">Bold 700</span></div>
  <div class="note">Zen Kaku Gothic New · line-height 1.8 · gentle tracking</div>
</body>
</html>
