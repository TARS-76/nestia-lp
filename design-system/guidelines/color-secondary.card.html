<!-- @dsCard group="Colors" viewport="700x190" name="Secondary & Background" subtitle="Almond Silk, Taupe, Dust Grey, off-white cream" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); }
  .row { display: flex; gap: 16px; flex-wrap: wrap; }
  .sw { width: 118px; border-radius: var(--r-md); overflow: hidden; box-shadow: var(--shadow-sm); background: var(--white); }
  .chip { height: 70px; }
  .meta { padding: 9px 11px 11px; }
  .nm { font-family: var(--font-body); font-size: 12px; font-weight: 500; color: var(--ink); }
  .hex { font-family: var(--font-body); font-size: 10.5px; letter-spacing: .04em; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; }
  .tag { font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; display: block; }
</style>
</head>
<body>
  <span class="tag">Secondary · Background</span>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--almond)"></div><div class="meta"><div class="nm">Almond Silk</div><div class="hex">#DBB6AB</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--taupe)"></div><div class="meta"><div class="nm">Taupe</div><div class="hex">#AC9B90</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--dust)"></div><div class="meta"><div class="nm">Dust Grey</div><div class="hex">#D0CCC9</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--cream); box-shadow: inset 0 0 0 1px var(--line)"></div><div class="meta"><div class="nm">Cream</div><div class="hex">#F8F4F1</div></div></div>
  </div>
</body>
</html>
