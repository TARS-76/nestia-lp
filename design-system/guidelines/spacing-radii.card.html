<!-- @dsCard group="Spacing" viewport="700x180" name="Radii & Shadows" subtitle="Generous rounding, soft warm elevation" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 26px 32px; background: var(--surface-page); font-family: var(--font-body); }
  .grp { display: flex; gap: 30px; flex-wrap: wrap; }
  .col { display: flex; gap: 16px; flex-wrap: wrap; }
  .box { width: 70px; height: 70px; background: var(--white); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px; }
  .lab { font-size: 10px; color: var(--text-muted); letter-spacing: .03em; }
  .tag { font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; display: block; }
</style>
</head>
<body>
  <span class="tag">Radii &nbsp;·&nbsp; Shadows</span>
  <div class="grp">
    <div class="col">
      <div class="box" style="border-radius:var(--r-sm); box-shadow:var(--shadow-xs)"><span class="lab">sm 10</span></div>
      <div class="box" style="border-radius:var(--r-md); box-shadow:var(--shadow-xs)"><span class="lab">md 16</span></div>
      <div class="box" style="border-radius:var(--r-lg); box-shadow:var(--shadow-xs)"><span class="lab">lg 24</span></div>
      <div class="box" style="border-radius:var(--r-pill); width:110px; box-shadow:var(--shadow-xs)"><span class="lab">pill</span></div>
    </div>
    <div class="col">
      <div class="box" style="border-radius:var(--r-md); box-shadow:var(--shadow-sm)"><span class="lab">sm</span></div>
      <div class="box" style="border-radius:var(--r-md); box-shadow:var(--shadow-md)"><span class="lab">md</span></div>
      <div class="box" style="border-radius:var(--r-md); box-shadow:var(--shadow-lg)"><span class="lab">lg</span></div>
    </div>
  </div>
</body>
</html>
