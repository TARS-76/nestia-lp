<!-- @dsCard group="Type" viewport="700x250" name="Display — Cormorant Garamond" subtitle="The airy serif behind the wordmark & headings" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px 32px; background: var(--surface-page); }
  .wordmark { font-family: var(--font-display); font-weight: 500; font-size: 64px; color: var(--plum); letter-spacing: var(--ls-wordmark); line-height: 1; }
  .wordmark .dot { color: var(--accent); }
  .sub { font-family: var(--font-display); font-weight: 400; font-style: italic; font-size: 22px; color: var(--rose); letter-spacing: .04em; margin-top: 2px; }
  .line { font-family: var(--font-display); color: var(--ink); margin-top: 20px; }
  .l1 { font-size: 44px; font-weight: 300; }
  .l2 { font-size: 30px; font-weight: 500; }
  .note { font-family: var(--font-body); font-size: 11px; letter-spacing: .04em; color: var(--text-muted); margin-top: 16px; }
</style>
</head>
<body>
  <div class="wordmark">nestia<span class="dot">.</span></div>
  <div class="sub">relaxation salon</div>
  <div class="line l1">Made for the you of today</div>
  <div class="line l2">Order-made care, 300 / 400 / 500</div>
  <div class="note">Cormorant Garamond · weights 300–600 + italic · wide tracking on the lockup</div>
</body>
</html>
